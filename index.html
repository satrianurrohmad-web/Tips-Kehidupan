<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tips Kehidupan Satria</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #334155;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #38bdf8;
    }

    footer {
      margin-top: 30px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>Tips Kehidupan Satria 🚀</h1>
  <p>Website motivasi & kehidupan sehari-hari</p>

  <button class="btn" onclick="tambahTips()">
    Tampilkan Tips Baru ✨
  </button>
</header>

<div class="container" id="tips">

  <div class="card">
    <h3>Bangun Pagi</h3>
    <p>Mulai hari lebih produktif.</p>
  </div>

  <div class="card">
    <h3>Fokus</h3>
    <p>Kurangi distraksi saat belajar.</p>
  </div>

  <div class="card">
    <h3>Konsisten</h3>
    <p>Lebih baik sedikit tapi rutin.</p>
  </div>

</div>

<footer>
  Dibuat oleh Satria 😎
</footer>

<script>
function tambahTips() {
  const container = document.getElementById("tips");

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h3>Tips Baru 🔥</h3>
    <p>Jangan menyerah, setiap hari kamu jadi lebih baik!</p>
  `;

  container.appendChild(card);
}
</script>

</body>
</html>
