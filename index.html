<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeHub Satria</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --accent: #38bdf8;
    }

    body.light {
      --bg: #f1f5f9;
      --card: white;
      --text: black;
      --accent: #2563eb;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--card);
      position: sticky;
      top: 0;
    }

    .menu a {
      color: var(--text);
      margin: 0 10px;
      text-decoration: none;
    }

    header {
      text-align: center;
      padding: 40px;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<nav>
  <div><b>LifeHub Satria</b></div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Tips</a>
    <a href="#">About</a>
  </div>
</nav>

<header>
  <h1>🚀 Welcome Satria</h1>
  <p>Website super pro kehidupan & motivasi</p>

  <button class="btn" onclick="toggleMode()">
    Ganti Mode 🌗
  </button>
</header>

<div class="container">

  <div class="card">
    <h3>Disiplin</h3>
    <p>Kunci sukses adalah konsistensi.</p>
  </div>

  <div class="card">
    <h3>Fokus</h3>
    <p>Kurangi distraksi setiap hari.</p>
  </div>

  <div class="card">
    <h3>Belajar</h3>
    <p>Sedikit tapi rutin lebih kuat.</p>
  </div>

</div>

<footer>
  Dibuat oleh Satria 😎 | Super Duper Pro Web
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
