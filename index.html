<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Beranda - Belajar Satria</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      animation: fadeIn 0.6s ease-in;
    }

    /* ANIMASI MASUK */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    nav {
      background: #1e293b;
      padding: 15px;
      display: flex;
      gap: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
      transform: scale(1.1);
    }

    .container {
      padding: 30px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 4px solid #38bdf8;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
    }

    h1 {
      color: #38bdf8;
    }

    h2 {
      margin-top: 30px;
      color: #f1f5f9;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">🏠 Beranda</a>
  <a href="motivasi.html">💪 Motivasi</a>
</nav>

<div class="container">

  <h1>Apa itu Belajar?</h1>
  <p>
    Belajar adalah proses memahami hal baru untuk menjadi lebih baik setiap hari.
  </p>

  <h2>Mengapa kita harus belajar?</h2>

  <div class="card">🎯 Agar punya masa depan yang lebih baik</div>
  <div class="card">🚀 Agar bisa mencapai cita-cita</div>
  <div class="card">🧠 Agar terus berkembang</div>

</div>

</body>
</html>
