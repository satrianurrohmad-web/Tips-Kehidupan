<script>
async function kirim() {

  let input =
    document.getElementById("input");

  let teks =
    input.value;

  if (teks.trim() === "") return;

  let chat =
    document.getElementById("chat");

  /* PESAN USER */
  let userMsg =
    document.createElement("div");

  userMsg.className =
    "message user";

  userMsg.innerText =
    teks;

  chat.appendChild(userMsg);

  input.value = "";

  /* PESAN AI */
  let aiMsg =
    document.createElement("div");

  aiMsg.className =
    "message ai";

  aiMsg.innerText =
    "🤖 Sedang berpikir...";

  chat.appendChild(aiMsg);

  chat.scrollTop =
    chat.scrollHeight;

  /* API GEMINI */
  const API_KEY = "AIzaSyAfrii5GzRl0rnow5TUdvY4J6mzcKSyqug";
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
    {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        contents: [
          {
            parts: [
              {
                text: teks
              }
            ]
          }
        ]
      })
    }
  );

  const data =
    await response.json();

  let jawaban =
    data.candidates?.[0]?.content?.parts?.[0]?.text
    || "⚠ AI tidak bisa menjawab.";

  aiMsg.innerText =
    jawaban;

  chat.scrollTop =
    chat.scrollHeight;
}
</script>
