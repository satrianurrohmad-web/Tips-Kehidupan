<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Pro - Satria</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111827;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:10px;
}

/* CHAT BOX */
#chat{
  height:70vh;
  overflow-y:auto;
  padding:10px;
}

/* USER MESSAGE */
.user{
  background:#2563eb;
  padding:10px;
  border-radius:12px;
  margin:8px 0;
  text-align:right;
}

/* AI MESSAGE */
.ai{
  background:#334155;
  padding:10px;
  border-radius:12px;
  margin:8px 0;
}

/* INPUT AREA */
.input-box{
  display:flex;
  padding:10px;
  background:#111827;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  margin-left:5px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>🤖 AI Satria Pro</div>
  <div>
    <a href="index.html">Home</a>
    <a href="tips.html">Tips</a>
    <a href="motivasi.html">Motivasi</a>
  </div>
</nav>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="input-box">
  <input id="input" placeholder="Tulis pesan...">
  <button onclick="kirim()">Kirim</button>
</div>

<script>

let history = []; // MEMORY CHAT

async function kirim(){

let input = document.getElementById("input");
let teks = input.value;

if(teks.trim().length < 1) return;

let chat = document.getElementById("chat");

/* USER MESSAGE */
let userMsg = document.createElement("div");
userMsg.className = "user";
userMsg.innerText = teks;
chat.appendChild(userMsg);

input.value = "";

/* SIMPAN MEMORY */
history.push({ role:"user", text:teks });

/* AI MESSAGE */
let ai = document.createElement("div");
ai.className = "ai";
ai.innerText = "🤖 mengetik...";
chat.appendChild(ai);

/* TYPING ANIMATION */
let dots = 0;
let loading = setInterval(() => {
  dots++;
  ai.innerText = "🤖 mengetik" + ".".repeat(dots % 4);
}, 400);

/* BUILD CONTEXT */
let context = history.map(h => `${h.role}: ${h.text}`).join("\n");

const API_KEY = "TEMPEL_API_KEY_KAMU";

try {

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[{
text: `
Kamu adalah AI asisten pintar, ramah, dan membantu.

Gunakan percakapan ini sebagai konteks:
${context}

Jawab pertanyaan terakhir dengan jelas dan singkat.
`
}]
}]
})
}
);

const data = await res.json();

clearInterval(loading);

let jawaban =
data?.candidates?.[0]?.content?.parts?.[0]?.text
|| "AI tidak bisa menjawab";

ai.innerText = jawaban;

/* SIMPAN RESPONSE */
history.push({ role:"ai", text:jawaban });

chat.scrollTop = chat.scrollHeight;

} catch (e) {
clearInterval(loading);
ai.innerText = "Error koneksi AI";
}

}

</script>

</body>
</html>
